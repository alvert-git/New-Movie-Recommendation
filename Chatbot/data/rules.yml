version: "3.1"

rules:
- rule: Greet the user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Handle movie search
  steps:
  - intent: recommend_movie
  - action: action_movie_search

- rule: Handle high budget search
  steps:
  - intent: recommend_high_budget
  - action: action_movie_search

- rule: Handle latest movie search
  steps:
  - intent: recommend_latest
  - action: action_movie_search

- rule: Handle short movie search
  steps:
  - intent: recommend_short_runtime
  - action: action_movie_search

- rule: Handle year movie search
  steps:
  - intent: recommend_by_year
  - action: action_movie_search

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Implementation of Fallback
  steps:
  - intent: nlu_fallback
  - action: utter_please_rephrase

- rule: out of scope
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope